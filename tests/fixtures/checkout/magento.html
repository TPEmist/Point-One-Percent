<!-- Magento/Adobe Commerce: Braintree hosted fields -->
<html><body>
<form id="co-payment-form">
  <input name="firstname" id="billing:firstname" autocomplete="given-name" placeholder="First name">
  <input name="lastname" id="billing:lastname" autocomplete="family-name" placeholder="Last name">
  <input name="street[0]" id="billing:street1" autocomplete="street-address" placeholder="Street Address">
  <input name="city" id="billing:city" autocomplete="address-level2" placeholder="City">
  <select name="region_id" id="billing:region_id" autocomplete="address-level1"><option value="CA">California</option></select>
  <input name="postcode" id="billing:postcode" autocomplete="postal-code" placeholder="Zip/Postal Code">
  <select name="country_id" id="billing:country_id" autocomplete="country"><option value="US">United States</option></select>
  <input name="email" type="email" autocomplete="email" placeholder="Email">
  <input name="telephone" type="tel" autocomplete="tel" placeholder="Phone Number">
  <!-- Braintree hosted fields -->
  <iframe id="braintree-hosted-field-number" src="about:blank"></iframe>
  <iframe id="braintree-hosted-field-expirationDate" src="about:blank"></iframe>
  <iframe id="braintree-hosted-field-cvv" src="about:blank"></iframe>
</form>
<template id="magento-braintree-card">
  <input name="credit-card-number" autocomplete="cc-number" placeholder="Card Number">
</template>
<template id="magento-braintree-expiry">
  <input name="expiration" autocomplete="cc-exp" placeholder="MM/YY">
</template>
<template id="magento-braintree-cvv">
  <input name="cvv" autocomplete="cc-csc" placeholder="CVV">
</template>
</body></html>
