<!-- Custom HTML form: direct card inputs, no iframes (baseline test) -->
<html><body>
<form id="checkout-form" action="/pay" method="POST">
  <input name="first_name" autocomplete="given-name" placeholder="First name">
  <input name="last_name" autocomplete="family-name" placeholder="Last name">
  <input name="address" autocomplete="street-address" placeholder="Street address">
  <input name="city" autocomplete="address-level2" placeholder="City">
  <select name="state" autocomplete="address-level1"><option value="CA">California</option></select>
  <input name="zip" autocomplete="postal-code" placeholder="Zip">
  <select name="country" autocomplete="country"><option value="US">United States</option></select>
  <input name="email" type="email" autocomplete="email" placeholder="Email">
  <input name="phone" type="tel" autocomplete="tel" placeholder="Phone">
  <input name="cardnumber" autocomplete="cc-number" placeholder="Card number">
  <input name="cc-exp" autocomplete="cc-exp" placeholder="MM / YY">
  <input name="cvc" autocomplete="cc-csc" placeholder="CVC">
  <button type="submit">Pay</button>
</form>
</body></html>
